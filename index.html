<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GANILAND</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
url("underground-bg.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
color:white;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
max-width:700px;
padding:40px;
}

.brand{
letter-spacing:12px;
font-size:13px;
opacity:.75;
margin-bottom:40px;
}

.title{
font-size:clamp(42px,8vw,82px);
font-weight:300;
letter-spacing:8px;
line-height:1.15;
margin-bottom:25px;
}

.line{
width:70px;
height:1px;
background:white;
margin:25px auto;
opacity:.4;
}

.subtitle{
font-size:18px;
letter-spacing:6px;
line-height:1.8;
opacity:.92;
}

.footer{
margin-top:40px;
font-size:12px;
letter-spacing:5px;
opacity:.55;
}

.instagram{
display:inline-block;
margin-top:50px;

padding:16px 42px;

border:1px solid rgba(255,255,255,.35);

text-decoration:none;
color:white;

letter-spacing:4px;
font-size:12px;

transition:.3s ease;
}

.instagram:hover{
background:white;
color:black;
}

@media(max-width:768px){

.title{
font-size:48px;
letter-spacing:4px;
}

.subtitle{
font-size:14px;
letter-spacing:3px;
}

.brand{
letter-spacing:6px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="brand">
GANILAND
</div>

<h1 class="title">
NO SHOP.<br>
NO STUDIO.<br>
NO CROWD.
</h1>

<div class="line"></div>

<div class="subtitle">
ONLY WORK.
</div>

<a
class="instagram"
href="https://instagram.com/gani_coo"
target="_blank">
INSTAGRAM
</a>

<div class="footer">
PRIVATE APPOINTMENT ONLY
</div>

</div>

</body>
</html>
