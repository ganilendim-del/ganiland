<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GANILAND</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at center,
#181818 0%,
#080808 45%,
#000000 100%);
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
color:white;
overflow:hidden;
}

.container{
text-align:center;
max-width:800px;
padding:40px;
}

.logo{
font-size:14px;
letter-spacing:10px;
opacity:.8;
margin-bottom:80px;
}

.title{
font-size:clamp(42px,7vw,96px);
letter-spacing:18px;
font-weight:300;
margin-bottom:30px;
}

.line{
width:80px;
height:1px;
background:#444;
margin:0 auto 30px;
}

.subtitle{
font-size:14px;
letter-spacing:4px;
color:#9a9a9a;
margin-bottom:60px;
}

.button{
display:inline-block;
padding:16px 32px;
border:1px solid rgba(255,255,255,.25);
color:white;
text-decoration:none;
letter-spacing:3px;
font-size:12px;
transition:.25s;
}

.button:hover{
background:white;
color:black;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
GANILAND
</div>

<div class="title">
COMING SOON
</div>

<div class="line"></div>

<div class="subtitle">
THE ARCHIVE IS BEING BUILT.
</div>

<a class="button"
href="https://instagram.com/gani_coo"
target="_blank">
INSTAGRAM
</a>

</div>

</body>
</html>
