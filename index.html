<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GANILAND</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background:
    background:
  linear-gradient(rgba(0,0,0,.28), rgba(0,0,0,.28)),
  url("underground-bg.png");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  overflow: hidden;
}


.page {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px;
  position: relative;
}

.frame {
  position: fixed;
  inset: 28px;
  border: 1px solid rgba(255,255,255,.08);
  pointer-events: none;
}

.content {
  text-align: center;
  max-width: 720px;
  transform: translateY(-8px);
}

.logo {
  font-size: 13px;
  letter-spacing: 10px;
  font-weight: 400;
  margin-bottom: 58px;
  color: rgba(255,255,255,.86);
}

.statement {
  font-size: clamp(26px, 4vw, 54px);
  letter-spacing: clamp(8px, 1.4vw, 20px);
  line-height: 1.55;
  font-weight: 300;
}

.line {
  width: 72px;
  height: 1px;
  background: rgba(255,255,255,.28);
  margin: 38px auto;
}

.work {
  font-size: clamp(24px, 3.6vw, 48px);
  letter-spacing: clamp(9px, 1.6vw, 22px);
  font-weight: 300;
}

.enter {
  display: inline-block;
  margin-top: 48px;
  padding: 15px 42px;
  border: 1px solid rgba(255,255,255,.26);
  color: #fff;
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 4px;
  transition: .25s ease;
}

.enter:hover {
  background: #fff;
  color: #000;
}

.note {
  margin-top: 34px;
  font-size: 11px;
  letter-spacing: 5px;
  color: rgba(255,255,255,.52);
}

.instagram {
  position: fixed;
  left: 48px;
  bottom: 44px;
  color: rgba(255,255,255,.75);
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 3px;
}

@media (max-width: 700px) {
  .frame {
    inset: 16px;
  }

  .logo {
    margin-bottom: 42px;
    letter-spacing: 7px;
  }

  .statement {
    letter-spacing: 7px;
  }

  .work {
    letter-spacing: 7px;
  }

  .instagram {
    left: 50%;
    transform: translateX(-50%);
    bottom: 28px;
  }
}
</style>
</head>

<body>
  <div class="frame"></div>

  <main class="page">
    <section class="content">
      <div class="logo">GANILAND</div>

      <div class="statement">
        NO SHOP.<br>
        NO STUDIO.<br>
        NO CROWD.
      </div>

      <div class="line"></div>

      <div class="work">
        ONLY WORK.
      </div>

      <a class="enter" href="https://instagram.com/gani_coo" target="_blank">
        ENTER
      </a>

      <div class="note">
        PRIVATE APPOINTMENT ONLY.
      </div>
    </section>

    <a class="instagram" href="https://instagram.com/gani_coo" target="_blank">
      INSTAGRAM
    </a>
  </main>
</body>
</html>
