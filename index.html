<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GANILAND</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.65)),
    url("underground-bg.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.container{
  padding:40px;
}

.brand{
  letter-spacing:12px;
  font-size:13px;
  opacity:.8;
  margin-bottom:45px;
}

.title{
  font-size:clamp(42px,7vw,86px);
  font-weight:300;
  letter-spacing:8px;
  line-height:1.2;
}

.line{
  width:70px;
  height:1px;
  background:white;
  opacity:.35;
  margin:30px auto;
}

.subtitle{
  font-size:18px;
  letter-spacing:7px;
  margin-bottom:45px;
}

.button{
  display:inline-block;
  padding:16px 44px;
  border:1px solid rgba(255,255,255,.38);
  color:white;
  text-decoration:none;
  letter-spacing:5px;
  font-size:12px;
}

.button:hover{
  background:white;
  color:black;
}

.footer{
  margin-top:36px;
  font-size:12px;
  letter-spacing:5px;
  opacity:.65;
}

@media(max-width:768px){
  .title{font-size:44px;letter-spacing:4px}
  .brand{letter-spacing:7px}
  .subtitle{font-size:14px;letter-spacing:4px}
}
</style>
</head>

<body>
  <div class="container">
    <div class="brand">GANILAND</div>

    <h1 class="title">
      NO SHOP.<br>
      NO STUDIO.<br>
      NO CROWD.
    </h1>

    <div class="line"></div>

    <div class="subtitle">ONLY WORK.</div>

    <a class="button" href="https://instagram.com/gani_coo" target="_blank">
      INSTAGRAM
    </a>

    <div class="footer">PRIVATE APPOINTMENT ONLY</div>
  </div>
</body>
</html>
